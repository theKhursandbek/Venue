<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/venue.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venue</title>
    <style>
      /* ── Splash Screen (pure CSS, zero JS) ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f0f7f8;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      [data-theme="dark"] #splash { background: #05161A; }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo container */
      .splash-logo-wrap {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }

      /* Main logo box */
      .splash-logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #0F969C, #294D61);
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        animation: splash-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
        box-shadow: 0 8px 32px rgba(15, 150, 156, 0.3);
      }
      .splash-logo span {
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -1px;
      }

      /* Spinning ring */
      .splash-ring {
        position: absolute;
        inset: -8px;
        border: 2px dashed rgba(15, 150, 156, 0.25);
        border-radius: 50%;
        animation: splash-ring-spin 8s linear infinite, splash-ring-fade 0.8s ease 0.3s both;
      }

      /* Pulsing halo */
      .splash-halo {
        position: absolute;
        inset: -4px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(15,150,156,0.2), rgba(109,165,192,0.15), rgba(12,112,117,0.2));
        filter: blur(16px);
        animation: splash-breathe 2s ease-in-out infinite, splash-ring-fade 0.6s ease 0.2s both;
      }

      /* Orbiting dots */
      .splash-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #0F969C;
        opacity: 0;
      }
      .splash-dot:nth-child(1) {
        top: -12px; left: 50%;
        animation: splash-dot-orbit 3s ease-in-out infinite, splash-ring-fade 0.5s ease 0.5s both;
      }
      .splash-dot:nth-child(2) {
        bottom: -12px; right: 10%;
        width: 4px; height: 4px;
        background: #6DA5C0;
        animation: splash-dot-orbit2 4s ease-in-out infinite, splash-ring-fade 0.5s ease 0.7s both;
      }
      .splash-dot:nth-child(3) {
        top: 30%; left: -10px;
        width: 5px; height: 5px;
        background: #0C7075;
        animation: splash-dot-orbit3 3.5s ease-in-out infinite, splash-ring-fade 0.5s ease 0.9s both;
      }

      /* Title text */
      .splash-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(90deg, #0F969C, #294D61, #0F969C);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: splash-text-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both,
                   splash-gradient-flow 4s linear infinite;
      }

      /* Subtitle */
      .splash-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #6DA5C0;
        margin-top: 6px;
        animation: splash-text-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
      }

      /* Loading bar */
      .splash-bar-track {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: rgba(15, 150, 156, 0.1);
        margin-top: 28px;
        overflow: hidden;
        animation: splash-ring-fade 0.5s ease 0.8s both;
      }
      .splash-bar {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #0F969C, #6DA5C0);
        animation: splash-loading 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.8s both;
      }

      /* ── Splash keyframes ── */
      @keyframes splash-pop {
        0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
        60% { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
        100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      }
      @keyframes splash-ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-ring-fade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.12); opacity: 0.8; }
      }
      @keyframes splash-dot-orbit {
        0%, 100% { transform: translateY(0) translateX(-50%); }
        50% { transform: translateY(-8px) translateX(-40%); }
      }
      @keyframes splash-dot-orbit2 {
        0%, 100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(10px) translateX(-6px); }
      }
      @keyframes splash-dot-orbit3 {
        0%, 100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(-6px) translateX(8px); }
      }
      @keyframes splash-text-up {
        from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      @keyframes splash-gradient-flow {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
      }
      @keyframes splash-loading {
        0% { width: 0%; }
        40% { width: 60%; }
        80% { width: 90%; }
        100% { width: 100%; }
      }

      @media (prefers-reduced-motion: reduce) {
        #splash * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <div class="splash-logo-wrap">
        <div class="splash-halo"></div>
        <div class="splash-logo"><span>V</span></div>
        <div class="splash-ring"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
      <div class="splash-title">Venue</div>
      <div class="splash-subtitle" id="splash-subtitle"></div>
      <div class="splash-bar-track"><div class="splash-bar"></div></div>
    </div>

    <div id="root"></div>
    <script>
      // Set splash subtitle based on saved language
      (function() {
        var subtitles = {
          uz: "Joylarni bron qiling, lahzalar yarating",
          ru: "\u0411\u0440\u043e\u043d\u0438\u0440\u0443\u0439\u0442\u0435 \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0430, \u0441\u043e\u0437\u0434\u0430\u0432\u0430\u0439\u0442\u0435 \u043c\u043e\u043c\u0435\u043d\u0442\u044b",
          en: "Reserve spaces, create moments"
        };
        var lang = "uz";
        try {
          var stored = localStorage.getItem("venue-language");
          if (stored) { lang = JSON.parse(stored).state.language || "uz"; }
        } catch(e) { console.warn("splash: failed to read language", e); }
        document.getElementById("splash-subtitle").textContent = subtitles[lang] || subtitles.uz;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
